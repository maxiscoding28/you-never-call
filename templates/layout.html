{{define "layout"}}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>You Never Call</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"></script>
    <style>
        :root {
            --overdue: #e53935;
            --due-soon: #f57c00;
            --ok: #43a047;
        }
        body { min-height: 100vh; }
        nav .brand {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        nav .brand span { opacity: 0.6; font-weight: 400; }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 0.4rem;
            vertical-align: middle;
        }
        .status-overdue  { background-color: var(--overdue); }
        .status-due-soon { background-color: var(--due-soon); }
        .status-ok       { background-color: var(--ok); }

        .status-text-overdue  { color: var(--overdue); font-weight: 600; }
        .status-text-due-soon { color: var(--due-soon); font-weight: 600; }
        .status-text-ok       { color: var(--ok); }

        table th a {
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            white-space: nowrap;
        }
        table th a:hover { opacity: 0.7; }

        table tbody tr {
            transition: background-color 0.15s ease;
        }
        table tbody tr:hover {
            background-color: rgba(0,0,0,0.03);
        }

        .view-toggle {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .view-toggle button,
        .view-toggle a {
            font-size: 0.875rem;
        }

        .group-section {
            margin-bottom: 2rem;
        }
        .group-section h3 {
            margin-bottom: 0.5rem;
            padding-bottom: 0.25rem;
            border-bottom: 2px solid var(--pico-muted-border-color, #dee2e6);
        }

        .actions-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            opacity: 0.6;
        }

        .htmx-indicator {
            display: none;
        }
        .htmx-request .htmx-indicator,
        .htmx-request.htmx-indicator {
            display: inline-block;
        }
    </style>
</head>
<body>
    <nav class="container">
        <ul>
            <li><a href="/" class="brand">☎ You Never Call</a></li>
        </ul>
        <ul>
            <li><a href="/">Dashboard</a></li>
            <li><a href="/groups">Groups</a></li>
            <li><a href="/contact/new" role="button" class="outline">+ Contact</a></li>
        </ul>
    </nav>
    <main class="container">
        {{template "content" .}}
    </main>
    <footer class="container">
        <small style="opacity:0.4">You Never Call — a local-first CRM</small>
    </footer>
</body>
</html>
{{end}}
