{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>You Never Call</title>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --fg: #111; --fg-muted: #777; --bg: #fff; --bg-alt: #fafafa;
            --border: #e0e0e0; --overdue: #c62828; --due-soon: #e65100; --ok: #558b2f;
            --radius: 4px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--fg); background: var(--bg); line-height: 1.5;
            min-height: 100vh; display: flex; flex-direction: column; font-size: 15px;
        }
        a { color: var(--fg); }
        a:hover { opacity: 0.6; }
        .container { max-width: 960px; margin: 0 auto; padding: 0 1.25rem; width: 100%; }

        /* Nav */
        nav { border-bottom: 1px solid var(--border); padding: 0.75rem 0; }
        nav .inner { display: flex; justify-content: space-between; align-items: center; }
        .brand { font-size: 1.15rem; font-weight: 700; text-decoration: none; letter-spacing: -0.02em; }
        .nav-links { display: flex; gap: 1.25rem; align-items: center; }
        .nav-links a { text-decoration: none; font-size: 0.875rem; color: var(--fg-muted); }
        .nav-links a:hover { color: var(--fg); opacity: 1; }

        /* Main */
        main { flex: 1; padding: 1.5rem 0; }

        /* Footer */
        footer.site-footer { padding: 1.5rem 0; }
        footer.site-footer small { color: var(--fg-muted); font-size: 0.75rem; }

        /* Buttons */
        .btn {
            display: inline-block; padding: 0.4rem 0.85rem; font-size: 0.8125rem;
            border: 1px solid var(--border); border-radius: var(--radius);
            background: var(--bg); color: var(--fg); text-decoration: none;
            cursor: pointer; line-height: 1.4; font-family: inherit;
            transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
        }
        .btn:hover { border-color: var(--fg); opacity: 1; }
        .btn.active { background: var(--fg); color: var(--bg); border-color: var(--fg); }
        .btn.active:hover { opacity: 0.85; color: var(--bg); }
        .btn-primary { background: var(--fg); color: var(--bg); border-color: var(--fg); }
        .btn-primary:hover { opacity: 0.85; color: var(--bg); }
        .btn-sm { padding: 0.2rem 0.5rem; font-size: 0.75rem; }
        .btn-danger { color: var(--overdue); border-color: var(--overdue); background: var(--bg); }
        .btn-danger:hover { background: var(--overdue); color: #fff; }

        /* Segmented button group */
        .btn-group { display: inline-flex; }
        .btn-group .btn {
            border-radius: 0; margin-left: -1px;
        }
        .btn-group .btn:first-child { border-top-left-radius: var(--radius); border-bottom-left-radius: var(--radius); margin-left: 0; }
        .btn-group .btn:last-child { border-top-right-radius: var(--radius); border-bottom-right-radius: var(--radius); }
        .btn-group .btn.active { position: relative; z-index: 1; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        thead th {
            text-align: left; font-size: 0.7rem; text-transform: uppercase;
            letter-spacing: 0.06em; color: var(--fg-muted); font-weight: 500;
            padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border);
        }
        thead th a { text-decoration: none; color: inherit; cursor: pointer; white-space: nowrap; }
        thead th a:hover { color: var(--fg); opacity: 1; }
        tbody td { padding: 0.5rem 0.75rem; border-bottom: 1px solid #f0f0f0; }
        tbody tr:hover { background: var(--bg-alt); }

        /* Status */
        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; vertical-align: middle; }
        .status-overdue  { background: var(--overdue); }
        .status-due-soon { background: var(--due-soon); }
        .status-ok       { background: var(--ok); }
        .status-text-overdue  { color: var(--overdue); font-weight: 600; }
        .status-text-due-soon { color: var(--due-soon); font-weight: 600; }
        .status-text-ok       { color: var(--ok); }

        /* Forms */
        label { display: block; font-size: 0.8125rem; color: var(--fg-muted); margin-bottom: 0.25rem; }
        input, select {
            display: block; width: 100%; padding: 0.45rem 0.6rem; font-size: 0.875rem;
            border: 1px solid var(--border); border-radius: var(--radius);
            background: var(--bg); color: var(--fg); font-family: inherit; margin-bottom: 1rem;
        }
        input:focus, select:focus { outline: none; border-color: #999; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

        /* Layout helpers */
        .actions-bar {
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 1rem; margin-bottom: 1.25rem;
        }
        .actions-left { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
        .group-section { margin-bottom: 1.75rem; }
        .group-section h3 {
            font-size: 0.875rem; font-weight: 600; margin-bottom: 0.5rem;
            padding-bottom: 0.25rem; border-bottom: 1px solid var(--border);
        }
        .empty-state { text-align: center; padding: 3rem 1rem; color: var(--fg-muted); }
        .danger-zone { margin-top: 2rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }
        .danger-zone summary { font-size: 0.8125rem; color: var(--fg-muted); cursor: pointer; }
        h2 { font-size: 1.15rem; font-weight: 600; margin-bottom: 1rem; }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator, .htmx-request.htmx-indicator { display: inline-block; }

        @media (max-width: 640px) {
            .form-row { grid-template-columns: 1fr; }
            .actions-bar { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="container inner">
            <a href="/" class="brand">You Never Call</a>
            <div class="nav-links">
                <a href="/">Dashboard</a>
                <a href="/groups">Groups</a>
                <a href="/contact/new">+ Contact</a>
            </div>
        </div>
    </nav>
    <main>
        <div class="container">
            {{template "content" .}}
        </div>
    </main>
    <footer class="site-footer">
        <div class="container">
            <small>You Never Call - A local-first, personal CRM</small>
        </div>
    </footer>
</body>
</html>
{{end}}
