{{template "layout" .}}

{{define "content"}}
<h2>{{if .IsNew}}New Contact{{else}}Edit Contact{{end}}</h2>

<form method="POST"
      action="{{if .IsNew}}/contact/new{{else}}/contact/{{.Contact.ID}}/update{{end}}">

    <div class="form-row">
        <div>
            <label for="first_name">First Name</label>
            <input type="text" id="first_name" name="first_name" value="{{.Contact.FirstName}}"
                   required placeholder="First name" autofocus>
        </div>
        <div>
            <label for="last_name">Last Name</label>
            <input type="text" id="last_name" name="last_name" value="{{.Contact.LastName}}"
                   required placeholder="Last name">
        </div>
    </div>

    <div class="form-row">
        <div>
            <label for="last_contact_date">Last Contact Date</label>
            <input type="date" id="last_contact_date" name="last_contact_date"
                   value="{{formatDateInput .Contact.LastContactDate}}">
        </div>
        <div>
            <label for="frequency_days">Frequency (days)</label>
            <input type="number" id="frequency_days" name="frequency_days" min="1" max="365"
                   value="{{.Contact.FrequencyDays}}" required>
        </div>
    </div>

    <div>
        <label for="group_id">Group</label>
        <select id="group_id" name="group_id">
            <option value="0">— No Group —</option>
            {{$gid := groupIDValue .Contact.GroupID}}
            {{range .Groups}}
            <option value="{{.ID}}" {{if eq .ID $gid}}selected{{end}}>{{.Name}}</option>
            {{end}}
        </select>
    </div>

    <div>
        <label for="notes">Notes</label>
        <textarea id="notes" name="notes" rows="5" placeholder="Anything you want to remember…">{{.Contact.Notes}}</textarea>
    </div>

    <div class="form-row">
        <div><button type="submit" class="btn btn-primary">{{if .IsNew}}Create Contact{{else}}Save Changes{{end}}</button></div>
        <div><a href="/" class="btn">Cancel</a></div>
    </div>
</form>

{{if not .IsNew}}
<div class="danger-zone">
    <details>
        <summary>Danger Zone</summary>
        <form method="POST" action="/contact/{{.Contact.ID}}/delete"
              onsubmit="return confirm('Delete this contact permanently?')" style="margin-top:0.75rem">
            <button type="submit" class="btn btn-danger btn-sm">Delete Contact</button>
        </form>
    </details>
</div>
{{end}}
{{end}}
