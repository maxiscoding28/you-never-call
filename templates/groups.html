{{template "layout" .}}

{{define "content"}}
<h2>Manage Groups</h2>

<form hx-post="/groups/create" hx-target="#group-list" hx-swap="innerHTML"
      hx-on::after-request="if(event.detail.successful) this.reset()">
    <div class="form-row">
        <div>
            <input type="text" name="name" placeholder="New group name…" required>
        </div>
        <div>
            <button type="submit" class="btn btn-primary">Add Group</button>
        </div>
    </div>
</form>

<div id="group-list">
    {{template "group_list" .}}
</div>
{{end}}
